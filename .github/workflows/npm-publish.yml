name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest

      - run: npm ci

      # Pre-releases on GitHub publish under the "beta" npm tag so they do not
      # replace the "latest" version that regular users install. A normal
      # (non-prerelease) GitHub release publishes as "latest" as usual.
      - run: npm publish ${{ github.event.release.prerelease && '--tag beta' || '' }}
